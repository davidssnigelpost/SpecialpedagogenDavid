<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specialpedagogiskt Stöd - Startsida</title>
    <style>
        :root { --primary: #5d7a8c; --secondary: #a3b899; --bg: #fdfaf5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        header { background: var(--primary); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            border: 4px solid #eee; 
            cursor: pointer; 
            text-decoration: none; 
            color: #333; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card h3 { margin: 15px 0 5px 0; font-size: 1.5rem; }
        .card p { margin: 0; color: #666; }

        /* Färg för Skolord Steg 1 */
        .gold { border-color: #f1c40f; background: #fffdf0; }
        /* Färg för Skolord NO (Ditt nya spel!) */
        .green { border-color: #27ae60; background: #f0f9f4; }
        
        .icon { font-size: 3rem; }
    </style>
</head>
<body>

    <header>
        <h1>Specialpedagogiskt Stöd</h1>
        <p>Välj en övning nedan för att börja träna!</p>
    </header>

    <div class="grid">

        <div class="card gold" onclick="window.location.href='skolord.html'">
            <span class="icon">🎓</span>
            <h3>Skolord Steg 1</h3>
            <p>Träna de 40 orden från bedömningen</p>
        </div>

        <div class="card green" onclick="window.location.href='skolordno.html'">
            <span class="icon">🌿</span>
            <h3>Skolord NO</h3>
            <p>30 begrepp om natur och miljö</p>
        </div>

        <div class="card" onclick="window.location.href='lasning.html'">
            <span class="icon">📖</span>
            <h3>Lästräning</h3>
            <p>Skriv ord med 3 bokstäver</p>
        </div>

        <div class="card" onclick="window.location.href='matte.html'">
            <span class="icon">➕</span>
            <h3>Matematik</h3>
            <p>Träna på 10-kompisar</p>
        </div>

    </div>

    <footer style="margin-top: 50px; color: #999;">
        <p>Gå till <a href="lektioner.html">Lektioner</a> | <a href="index.html">Hem</a></p>
    </footer>

</body>
</html>
